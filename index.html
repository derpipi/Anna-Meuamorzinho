<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna's Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="title">
        <h1>ANNA !!</h1>
    </div>

    <div class="grid">

        <!-- Perfil -->
        <div class="box profile">
            <img src="foto.jpg" alt="Anna">

            <div class="status">
                <p>"Don't be afraid to talk to me :)"</p>
                <span class="online">🟢 ONLINE</span>
            </div>

            <div class="mood">
                Mood: apaixonada ♡
            </div>
        </div>

        <!-- Sobre -->
        <div class="box about">
            <h2>About Me</h2>

            <p>
                Meu nome é Anna ♡<br>
                Eu amo música, filmes e passar tempo com você.
            </p>

            <h3>Quem eu gostaria de conhecer</h3>

            <p>
                Você ❤️
            </p>
        </div>

        <!-- Interesses -->
        <div class="box interests">
            <h2>Interesses</h2>

            <ul>
                <li>🎵 Música</li>
                <li>🛍️ Compras</li>
                <li>🎸 Violão</li>
                <li>🎬 Filmes</li>
                <li>🌸 Anime</li>
            </ul>
        </div>

        <!-- Amigos -->
        <div class="box friends">
            <h2>Friend Space</h2>

            <div class="friend-grid">

                <img src="friend1.jpg">
                <img src="friend2.jpg">
                <img src="friend3.jpg">
                <img src="friend4.jpg">

                <img src="friend5.jpg">
                <img src="friend6.jpg">
                <img src="friend7.jpg">
                <img src="friend8.jpg">

            </div>
        </div>

    </div>

</div>

</body>
</html>
